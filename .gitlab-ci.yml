stages:
  - up
  - test
  - smoke
  - report
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_TLS_CERTDIR: ""
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  ALLURE_VERSION: "2.27.0"

services:
  - docker:dind

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .gradle/wrapper
    - .gradle/caches

before_script:
  - export GRADLE_USER_HOME=`pwd`/.gradle

up:
  stage: up
  image: docker/compose:1.29.2
  script:
    - docker-compose up -d
    - |
      for i in {1..30}; do
        if docker exec portfolio_postgres pg_isready -U portfolio_user; then
          echo "Postgres is up!"
          break
        fi
        echo "Waiting for Postgres to be ready..."
        sleep 2
      done
    - |
      for i in {1..30}; do
        if curl -s http://localhost:8082/actuator/health | grep '"status":"UP"' > /dev/null; then
          echo "API is up!"
          break
        fi
        echo "Waiting for API to be ready..."
        sleep 2
      done
    - docker-compose ps
  artifacts:
    paths:
      - docker-compose.yml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")'
      when: on_success
    - when: manual

test:
  stage: test
  image: gradle:8.5-jdk17
  script:
    - ./gradlew :tests:test
  dependencies:
    - up
  artifacts:
    when: always
    paths:
      - tests/allure-results/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")'
      when: on_success
    - when: manual

smoke-test:
  stage: smoke
  image: gradle:8.5-jdk17
  script:
    - ./gradlew :tests:smokeTest
  dependencies:
    - up
  artifacts:
    when: always
    paths:
      - tests/allure-results/
    expire_in: 1 week
  rules:
    - when: manual
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")'
      when: never

allure-report:
  stage: report
  image: registry.gitlab.com/qameta/allure/allure:${ALLURE_VERSION}
  script:
    - |
      if [ -d "tests/allure-results" ]; then
        allure generate tests/allure-results --clean -o public
      else
        echo "No allure results found!"
        exit 1
      fi
  dependencies:
    - test
    - smoke-test
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - when: manual
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")'
      when: on_success

pages:
  stage: deploy
  script:
    - echo "Allure report published to GitLab Pages"
  dependencies:
    - allure-report
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - when: manual
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")'
      when: on_success