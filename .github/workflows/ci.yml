name: Smoke tests + allure report

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5454/portfolio_db
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
      AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
      VALID_API_LOGIN: ${{ secrets.VALID_API_LOGIN }}
      VALID_API_PASSWORD: ${{ secrets.VALID_API_PASSWORD }}
      INVALID_API_LOGIN: ${{ secrets.INVALID_API_LOGIN }}
      INVALID_API_PASSWORD: ${{ secrets.INVALID_API_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      STANDARD_LOGIN_USER: ${{ secrets.STANDARD_LOGIN_USER }}
      STANDARD_LOGIN_PASSWORD: ${{ secrets.STANDARD_LOGIN_PASSWORD }}
      LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
      LOCKED_OUT_PASSWORD: ${{ secrets.LOCKED_OUT_PASSWORD }}
      RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
      RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
      RABBITMQ_HOST: rabbitmq

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build API jar
        run: ./gradlew clean :api:build
      - name: Start API and dependencies
        run: |
          docker compose up -d
          for i in {1..30}; do
            if docker exec portfolio_postgres pg_isready -U portfolio_user; then
              echo "Postgres is up!"
              break
            fi
            echo "Waiting for Postgres to be ready..."
            sleep 3
          done
          for i in {1..30}; do
            if curl -s http://localhost:8082/swagger-ui/index.html > /dev/null; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API to be ready..."
            sleep 3
          done
          docker compose ps
      - name: Run API smoke tests
        run: ./gradlew :api-tests:smokeTest
      - name: Run UI smoke tests
        run: ./gradlew :ui-tests:smokeTest
      - name: Upload Allure results (API)
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke-api
          path: api-tests/allure-results/
      - name: Upload Allure results (UI)
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke-ui
          path: ui-tests/allure-results/

  allure-report:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Allure results (API)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke-api
          path: api-tests/allure-results/
      - name: Download Allure results (UI)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke-ui
          path: ui-tests/allure-results/
      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev
      - name: Generate Allure report
        run: |
          allure generate api-tests/allure-results ui-tests/allure-results --clean -o public
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: public/

  deploy:
    needs: allure-report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: public/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public