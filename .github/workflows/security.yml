name: Security Scan

on:
  workflow_dispatch:

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5454/portfolio_db
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
      AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
      VALID_API_LOGIN: ${{ secrets.VALID_API_LOGIN }}
      VALID_API_PASSWORD: ${{ secrets.VALID_API_PASSWORD }}
      INVALID_API_LOGIN: ${{ secrets.INVALID_API_LOGIN }}
      INVALID_API_PASSWORD: ${{ secrets.INVALID_API_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      STANDARD_LOGIN_USER: ${{ secrets.STANDARD_LOGIN_USER }}
      STANDARD_LOGIN_PASSWORD: ${{ secrets.STANDARD_LOGIN_PASSWORD }}
      LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
      LOCKED_OUT_PASSWORD: ${{ secrets.LOCKED_OUT_PASSWORD }}
      RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
      RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
      RABBITMQ_HOST: localhost

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build API jar
        run: ./gradlew clean :api:build

      - name: Start API and dependencies
        run: |
          docker compose up -d
          for i in {1..30}; do
            if docker exec portfolio_postgres pg_isready -U portfolio_user; then
              echo "Postgres is up!"
              break
            fi
            echo "Waiting for Postgres to be ready..."
            sleep 3
          done
          for i in {1..30}; do
            if curl -s http://localhost:8082/swagger-ui.html > /dev/null; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API to be ready..."
            sleep 3
          done
          docker compose ps

      - name: Docker Compose Logs (debug)
        if: always()
        run: docker compose logs

      - name: Check API login endpoint (debug)
        run: |
          echo "Checking /api/auth/login endpoint:"
          curl -v http://localhost:8082/api/auth/login || true

      - name: Get JWT Token
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8082/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${AUTH_USERNAME}\",\"password\":\"${AUTH_PASSWORD}\"}")
          echo "Login response: $RESPONSE"
          TOKEN=$(echo $RESPONSE | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "JWT token not received! Exiting."
            exit 1
          fi
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: ZAP Full Scan (with OpenAPI and Replacer)
        run: |
          docker run --rm \
            -v $(pwd):/zap/wrk:rw \
            --network host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
              -t http://localhost:8082 \
              -r report_html.html \
              -J report_json.json \
              -w report_md.md \
              -openapi http://localhost:8082/api-docs \
              -config "replacer.full_list(0).description=authheader" \
              -config "replacer.full_list(0).enabled=true" \
              -config "replacer.full_list(0).matchtype=REQ_HEADER" \
              -config "replacer.full_list(0).matchstr=Authorization" \
              -config "replacer.full_list(0).replacement=Bearer ${{ env.TOKEN }}"
        env:
          TOKEN: ${{ env.TOKEN }}

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zapreport
          path: |
            report_html.html
            report_json.json
            report_md.md